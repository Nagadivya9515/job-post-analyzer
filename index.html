<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Post Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { 
                transform: translateY(20px);
                opacity: 0;
            }
            to { 
                transform: translateY(0);
                opacity: 1;
            }
        }
        .active-history {
            @apply ring-2 ring-blue-400 bg-blue-100 !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen">
    
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <div class="flex items-center gap-3 mb-2">
                <i class="fas fa-briefcase text-4xl text-white"></i>
                <h1 class="text-4xl font-bold text-white">Job Post Analyzer</h1>
            </div>
            <p class="text-blue-100">Analyze job posts like a recruiter. Make smarter career decisions.</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Input Panel -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-xl p-8 slide-up">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">
                        <i class="fas fa-plus-circle text-blue-600"></i> New Analysis
                    </h2>
                    
                    <div class="space-y-6">
                        
                        <!-- Skills Input -->
                        <div>
                            <label class="block text-lg font-semibold text-gray-700 mb-3">
                                Your Technical Skills
                            </label>
                            <div id="skillsTags" class="flex flex-wrap gap-2 mb-4 min-h-12"></div>
                            <div class="flex gap-2">
                                <input
                                    id="skillInput"
                                    type="text"
                                    placeholder="e.g., react, node.js, sql, docker"
                                    class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition"
                                />
                                <button
                                    onclick="addSkill()"
                                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
                                >
                                    <i class="fas fa-plus"></i> Add
                                </button>
                            </div>
                            <p class="text-sm text-gray-500 mt-2">💡 Press Enter or click Add to add skill</p>
                        </div>

                        <!-- Job Title Input -->
                        <div>
                            <label class="block text-lg font-semibold text-gray-700 mb-2">
                                Job Title
                            </label>
                            <input
                                id="jobTitle"
                                type="text"
                                placeholder="e.g., Full Stack Developer"
                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition"
                            />
                        </div>

                        <!-- Job Description Input -->
                        <div>
                            <label class="block text-lg font-semibold text-gray-700 mb-2">
                                Job Description
                            </label>
                            <textarea
                                id="jobDesc"
                                placeholder="Paste the complete job description here..."
                                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none transition min-h-48 font-mono text-sm"
                            ></textarea>
                        </div>

                        <!-- Analyze Button -->
                        <button
                            onclick="analyzeJob()"
                            class="w-full py-4 text-lg font-bold rounded-lg bg-gradient-to-r from-blue-600 to-purple-600 text-white hover:shadow-lg hover:scale-105 transition transform"
                        >
                            <i class="fas fa-search"></i> Analyze Job Post
                        </button>
                    </div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-xl p-6 sticky top-4 slide-up">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-history text-purple-600"></i> Recent Analyses
                    </h3>
                    
                    <!-- Clear History Button -->
                    <button 
                        onclick="clearAllHistory()"
                        class="w-full mb-4 text-sm bg-red-100 text-red-700 px-3 py-2 rounded hover:bg-red-200 transition"
                    >
                        <i class="fas fa-trash"></i> Clear All
                    </button>

                    <div id="historyPanel" class="space-y-3 max-h-96 overflow-y-auto">
                        <p class="text-gray-500 text-center py-8">No analyses yet. Start analyzing!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section (Dynamic) -->
        <div id="resultsSection" class="mt-12 hidden space-y-6 fade-in"></div>

        <!-- View Indicator -->
        <div id="viewIndicator" class="mt-8 hidden text-center">
            <p class="text-white text-sm bg-blue-600 px-4 py-2 rounded-lg inline-block">
                <i class="fas fa-eye"></i> Viewing past analysis: <span id="viewingTitle" class="font-bold"></span>
            </p>
            <button 
                onclick="resetView()"
                class="ml-4 text-white bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-700 transition"
            >
                <i class="fas fa-times"></i> Close
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center py-6 mt-12">
        <p>© 2024 Job Post Analyzer | Made with <i class="fas fa-heart text-red-500"></i> by You</p>
    </footer>

    <script src="logic.js"></script>
</body>
</html>
